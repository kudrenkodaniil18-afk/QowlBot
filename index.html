<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>QOWL | Профиль</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0f1a 0%, #03060c 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Премиум карточка */
        .card {
            max-width: 460px;
            width: 100%;
            background: rgba(10, 20, 30, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(212, 175, 55, 0.1) inset;
            padding: 28px 24px 36px;
            transition: all 0.2s ease;
        }

        /* Аватар */
        .avatar {
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #1f2a3a, #0b1018);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4), 0 0 0 3px #d4af37, 0 0 0 6px rgba(212,175,55,0.2);
        }
        .avatar span {
            font-size: 52px;
            font-weight: 600;
            color: #d4af37;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }

        /* Инфо */
        .user-name {
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            color: #fff;
            letter-spacing: -0.3px;
            margin-bottom: 6px;
        }
        .user-id {
            text-align: center;
            font-size: 14px;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 60px;
            margin: 8px auto 12px;
            color: #b9c7d4;
            backdrop-filter: blur(4px);
        }
        .stat-block {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 32px;
            padding: 16px 20px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            border: 1px solid rgba(212,175,55,0.2);
        }
        .stat-label {
            color: #a0b3c9;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-size: 36px;
            font-weight: 800;
            color: #d4af37;
            line-height: 1;
        }
        .stat-value small {
            font-size: 14px;
            font-weight: 400;
            color: #ecf0f3;
        }
        .badge-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }
        .badge {
            background: rgba(212,175,55,0.15);
            border: 0.5px solid rgba(212,175,55,0.5);
            border-radius: 60px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 500;
            color: #f5e6b0;
        }
        .refresh-btn {
            background: linear-gradient(90deg, #1a2a3a, #0f1822);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            color: #d4af37;
            margin-top: 24px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(212,175,55,0.4);
        }
        .refresh-btn:active {
            transform: scale(0.97);
            background: #0f1822;
        }
        .loader {
            width: 28px;
            height: 28px;
            border: 3px solid #2c3e44;
            border-top: 3px solid #d4af37;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error {
            color: #ff908c;
            background: rgba(255,60,50,0.1);
            padding: 12px;
            border-radius: 24px;
            text-align: center;
            font-size: 14px;
        }
        footer {
            text-align: center;
            font-size: 11px;
            color: #4e6279;
            margin-top: 24px;
        }
        .id-wrapper {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card" id="app">
        <div class="avatar" id="avatar">
            <span id="avatarLetter">👤</span>
        </div>
        <div class="user-name" id="fullName">Загрузка...</div>
        <div class="id-wrapper">
            <div class="user-id" id="userId"></div>
        </div>
        <div class="stat-block">
            <span class="stat-label">👥 РЕФЕРАЛОВ</span>
            <span class="stat-value" id="refsCount">—</span>
        </div>
        <div id="achievementsBlock" style="margin-top: 8px;">
            <div class="badge-list" id="badgesList"></div>
        </div>
        <button class="refresh-btn" id="refreshBtn">
            🔄 ОБНОВИТЬ
        </button>
        <footer>QOWL • премиум доступ</footer>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();   // растягиваем на весь экран
        tg.ready();

        const API_BASE = "https://ВАШ_СЕРВЕР_БОТА";  // замените на реальный https://ваш-домен:8080
        let currentUser = null;

        // --- Генерация аватарки по имени ---
        function getInitials(firstName, lastName, username) {
            let str = (firstName ? firstName[0] : (username ? username[0] : '?')).toUpperCase();
            if (lastName && lastName[0]) str += lastName[0].toUpperCase();
            return str;
        }

        function updateUI(data) {
            if (!data) return;
            const full = data.first_name ? `${data.first_name} ${data.last_name || ''}` : (data.display_name || data.username || 'Пользователь');
            document.getElementById('fullName').innerText = full.trim();
            document.getElementById('userId').innerText = `ID: ${data.user_id}`;
            document.getElementById('refsCount').innerHTML = `${data.refs} <small>/ 10</small>`;
            // аватар (первые буквы)
            const initials = getInitials(data.first_name, data.last_name, data.username);
            document.getElementById('avatarLetter').innerText = initials;

            // достижения
            const badgesDiv = document.getElementById('badgesList');
            if (data.achievements && data.achievements.length) {
                badgesDiv.innerHTML = data.achievements.map(ach => `<div class="badge">🏆 ${ach}</div>`).join('');
            } else {
                badgesDiv.innerHTML = '<div class="badge">✨ Новые достижения скоро</div>';
            }
        }

        async function fetchUserData() {
            try {
                // получаем initData из Telegram WebApp
                const initData = tg.initData;
                if (!initData) {
                    throw new Error("Не удалось получить данные авторизации");
                }
                const url = `${API_BASE}/api/get_user_data?initData=${encodeURIComponent(initData)}`;
                const resp = await fetch(url);
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.error || `Ошибка ${resp.status}`);
                }
                const data = await resp.json();
                currentUser = data;
                updateUI(data);
                return data;
            } catch (error) {
                console.error(error);
                document.getElementById('refsCount').innerText = '❌';
                document.getElementById('fullName').innerText = 'Ошибка';
                const badgesDiv = document.getElementById('badgesList');
                badgesDiv.innerHTML = `<div class="error">⚠️ Не удалось загрузить данные. Попробуйте позже.</div>`;
                throw error;
            }
        }

        document.getElementById('refreshBtn').addEventListener('click', () => {
            const refEl = document.getElementById('refsCount');
            refEl.innerHTML = '<div class="loader" style="width:24px; height:24px; margin:0;"></div>';
            fetchUserData().catch(() => {
                refEl.innerText = '—';
            });
        });

        // первичная загрузка
        fetchUserData();
    </script>
</body>
</html>
