<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>QOWL Premium WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Helvetica, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #ffffff;
        }
        .premium-card {
            max-width: 420px;
            width: 100%;
            background: rgba(10, 20, 30, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(0, 100, 255, 0.35);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 160, 255, 0.15) inset;
            padding: 32px 24px 40px;
            text-align: center;
        }
        .avatar-wrapper {
            margin: 0 auto 20px;
            width: 110px;
            height: 110px;
            position: relative;
        }
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: linear-gradient(135deg, #1e3a6f, #0a1a2f);
            border: 3px solid #0077ff;
            box-shadow: 0 10px 20px rgba(0, 119, 255, 0.4);
        }
        .avatar-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(145deg, #0f2a44, #051322);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 600;
            color: #d4af37;
            border: 2px solid #2f6eb3;
        }
        .premium-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: linear-gradient(135deg, #f5b042, #d4af37);
            border-radius: 30px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,200,0.6);
        }
        .display-name {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #b0d4ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .username {
            font-size: 17px;
            color: #90a9c7;
            margin-top: 6px;
            background: rgba(0, 50, 100, 0.4);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 6px 15px;
            border-radius: 40px;
        }
        .user-id {
            font-size: 15px;
            background: #07121f;
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-block;
            font-family: monospace;
            border: 1px solid #1f4977;
            color: #bfd9ff;
            margin-top: 12px;
        }
        .test-button {
            margin-top: 36px;
            width: 100%;
            background: linear-gradient(95deg, #0a2a4a, #003366);
            border: none;
            padding: 16px 24px;
            border-radius: 100px;
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(0, 80, 200, 0.3);
            border: 1px solid rgba(0, 150, 255, 0.5);
        }
        .test-button:active {
            transform: scale(0.97);
        }
        .status-message {
            margin-top: 20px;
            font-size: 13px;
            color: #7d9ac0;
            background: rgba(0,20,40,0.6);
            border-radius: 30px;
            padding: 10px 12px;
        }
        .divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #2f6eb3, #d4af37, #2f6eb3, transparent);
            margin: 18px auto 8px;
        }
    </style>
</head>
<body>
    <div class="premium-card">
        <div class="avatar-wrapper" id="avatarContainer"></div>
        <div class="display-name" id="displayName">Загрузка...</div>
        <div class="username" id="usernameSection">🔗 <span id="usernameText">@</span></div>
        <div class="user-id" id="userIdText">🆔 ID: --</div>
        <div class="divider"></div>
        <button class="test-button" id="testBtn">
            <span>⚡ Отправить тест боту</span>
        </button>
        <div class="status-message" id="statusMsg">✨ Готов к действию</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        tg.setBackgroundColor("#03060c");

        // ⚠️ ЗАМЕНИТЕ НА РЕАЛЬНЫЙ АДРЕС ВАШЕГО СЕРВЕРА (IP:PORT или ngrok)
        const WEBHOOK_URL = "https://ВАШ_ПУБЛИЧНЫЙ_АДРЕС/webapp-data";  // НАПРИМЕР: "https://123.123.123.123:8080/webapp-data" или "https://xxxx.ngrok.io/webapp-data"

        let userData = tg.initDataUnsafe?.user || {
            id: 6411263772,
            first_name: "QOWL",
            last_name: "Premium",
            username: "qowl_premium",
            is_premium: true
        };

        function getInitials(first, last, username) {
            let initials = "";
            if (first?.length) initials += first[0].toUpperCase();
            if (last?.length) initials += last[0].toUpperCase();
            if (!initials && username?.length) initials = username[0].toUpperCase();
            if (!initials) initials = "U";
            return initials;
        }

        function renderAvatar() {
            const container = document.getElementById("avatarContainer");
            const initials = getInitials(userData.first_name, userData.last_name, userData.username);
            container.innerHTML = `<div class="avatar-placeholder">${initials}</div>`;
            const badge = document.createElement('div');
            badge.className = 'premium-badge';
            badge.innerHTML = '⭐';
            container.appendChild(badge);
        }

        function updateUserInfo() {
            if (!userData) return;
            const fullName = [userData.first_name, userData.last_name].filter(Boolean).join(' ') || userData.username || "Пользователь";
            document.getElementById("displayName").innerText = fullName;
            document.getElementById("usernameText").innerText = userData.username ? "@"+userData.username : "нет username";
            document.getElementById("userIdText").innerHTML = `🆔 ID: <span style="font-family: monospace;">${userData.id}</span>`;
        }

        async function sendTestToBot() {
            if (!userData) {
                tg.showPopup({ title: "Ошибка", message: "Нет данных пользователя", buttons: [{type: "close"}] });
                return;
            }
            const payload = {
                action: "test",
                user_id: userData.id,
                username: userData.username || "",
                timestamp: Date.now()
            };

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    tg.showPopup({
                        title: "📡 QOWL WebApp",
                        message: "Тест отправлен! Бот ответит в личные сообщения.",
                        buttons: [{ type: "ok", text: "✨ Отлично" }]
                    }, () => tg.close());
                } else {
                    throw new Error(`Server responded with ${response.status}`);
                }
            } catch (err) {
                console.error(err);
                tg.showPopup({ title: "Ошибка", message: "Не удалось отправить запрос. Проверьте адрес сервера.", buttons: [{type: "close"}] });
            }
        }

        renderAvatar();
        updateUserInfo();
        document.getElementById("testBtn").addEventListener("click", sendTestToBot);
        tg.ready();
    </script>
</body>
</html>
