<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Проверка подписки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        button { background: #2c7be5; color: white; border: none; border-radius: 12px; padding: 14px 24px; font-size: 1.2rem; width: 100%; margin: 20px 0; cursor: pointer; }
        .debug { background: #f0f0f0; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 0.8rem; text-align: left; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
<h1>📢 Проверка подписки</h1>
<button id="checkBtn">🔍 Проверить подписку</button>
<div class="debug" id="debug"></div>

<script>
    // Ваш публичный ngrok-адрес с правильным путём
    const SERVER_URL = "https://repent-fancy-sleeve.ngrok-free.dev/check_subscription";

    const debugDiv = document.getElementById('debug');
    function log(msg) {
        debugDiv.innerHTML += new Date().toLocaleTimeString() + ' ' + msg + '\n';
        debugDiv.scrollTop = debugDiv.scrollHeight;
        console.log(msg);
    }

    let user_id = null;
    if (window.Telegram && Telegram.WebApp) {
        const tg = Telegram.WebApp;
        tg.expand();
        tg.ready();
        user_id = tg.initDataUnsafe?.user?.id;
        log(`✅ WebApp готов. User ID: ${user_id || 'неизвестно'}`);
    } else {
        log('❌ Ошибка: не удалось инициализировать Telegram WebApp');
    }

    document.getElementById('checkBtn').onclick = async () => {
        log('🔘 Нажата кнопка');
        if (!user_id) {
            log('❌ Нет user_id. Откройте страницу через Telegram.');
            return;
        }
        log(`📤 Отправка HTTP запроса на ${SERVER_URL} с user_id=${user_id}`);
        try {
            const response = await fetch(SERVER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: user_id })
            });
            const data = await response.json();
            log(`✅ Сервер ответил: ${JSON.stringify(data)}`);
            if (data.status === 'ok') {
                log(`📨 Результат проверки: ${data.subscribed ? 'Подписан' : 'Не подписан'}`);
            } else {
                log(`⚠️ Ошибка сервера: ${data.error}`);
            }
        } catch (e) {
            log(`❌ Ошибка соединения: ${e.message}`);
        }
    };
</script>
</body>
</html>
