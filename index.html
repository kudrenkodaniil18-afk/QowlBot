<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QOWL World — Премиум</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'SF Pro Text', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            padding: 16px;
            padding-bottom: 30px;
        }
        /* Карточки золотые */
        .card {
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 0 1px rgba(212,175,55,0.1) inset;
            backdrop-filter: blur(2px);
        }
        /* Профиль */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #d4af37;
            box-shadow: 0 0 10px rgba(212,175,55,0.5);
        }
        .profile-name {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .profile-username {
            font-size: 0.85rem;
            color: #aaaaaa;
        }
        button {
            background: linear-gradient(135deg, #d4af37, #b8942e);
            border: none;
            border-radius: 40px;
            padding: 10px 18px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #0a0a0a;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        button:active {
            transform: scale(0.96);
            filter: brightness(0.9);
        }
        .secondary-btn {
            background: #2a2a2a;
            color: #d4af37;
            border: 1px solid #d4af37;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab {
            background: #1a1a1a;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #333;
            color: #ccc;
        }
        .tab.active {
            background: #d4af37;
            color: #0a0a0a;
            border-color: #d4af37;
            font-weight: bold;
        }
        .tab-content { display: none; animation: fade 0.2s; }
        .tab-content.active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 28px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 12px;
        }
        input:focus { outline: none; border-color: #d4af37; box-shadow: 0 0 8px rgba(212,175,55,0.3); }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .weather-time {
            background: #111;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.8rem;
            color: #d4af37;
            border: 1px solid #333;
        }
        footer {
            text-align: center;
            font-size: 0.65rem;
            margin-top: 20px;
            color: #555;
        }
        .badge {
            background: #d4af37;
            color: #0a0a0a;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="profile-header">
        <img class="avatar" id="userAvatar" src="" alt="avatar">
        <div>
            <div class="profile-name" id="userFullName">Загрузка...</div>
            <div class="profile-username" id="userUsername"></div>
        </div>
    </div>
    <div class="info-row">
        <div class="weather-time" id="timeDisplay">⏰ --:--:--</div>
        <div class="weather-time" id="weatherDisplay">🌤️ Загрузка...</div>
    </div>
</div>

<div class="tabs" id="tabsContainer">
    <div class="tab active" data-tab="home">🏠 Главная</div>
    <div class="tab" data-tab="referrals">👥 Рефералы</div>
    <div class="tab" data-tab="achievements">🏆 Достижения</div>
    <div class="tab" data-tab="profile">✏️ Профиль</div>
</div>

<!-- Главная -->
<div id="home" class="tab-content active">
    <div class="card">
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;">
            <button id="checkSubBtn">📌 Проверить подписку</button>
            <button id="topBtn">🏆 Топ рефералов</button>
            <button id="myAchievementsBtn">🏅 Мои достижения</button>
        </div>
        <div style="margin-top: 20px; text-align: center;">
            <p>🔗 Твоя реферальная ссылка:</p>
            <input type="text" id="refLinkInput" readonly style="text-align: center;">
            <div style="margin-top: 10px;">
                <button id="copyRefBtn">📋 Копировать</button>
                <button id="shareRefBtn">📤 Поделиться</button>
            </div>
        </div>
    </div>
</div>

<!-- Рефералы -->
<div id="referrals" class="tab-content">
    <div class="card">
        <button id="showRefsBtn" style="width:100%">👥 Показать моих рефералов</button>
    </div>
</div>

<!-- Достижения -->
<div id="achievements" class="tab-content">
    <div class="card">
        <p>✨ Нажмите «Мои достижения» на главной, чтобы увидеть список.</p>
    </div>
</div>

<!-- Профиль (смена имени) -->
<div id="profile" class="tab-content">
    <div class="card">
        <label>Имя (видно в боте):</label>
        <input type="text" id="editName" placeholder="Новое имя">
        <button id="saveProfileBtn">💾 Сохранить имя</button>
    </div>
</div>

<footer>QOWL World — премиум-доступ</footer>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Получение данных пользователя
    let user = tg.initDataUnsafe?.user || {};
    let userId = user.id;
    let firstName = user.first_name || "Гость";
    let lastName = user.last_name || "";
    let username = user.username || "";
    let photoUrl = user.photo_url || "";
    let isPremium = user.is_premium || false;

    // DOM элементы
    const userAvatar = document.getElementById("userAvatar");
    const userFullName = document.getElementById("userFullName");
    const userUsernameSpan = document.getElementById("userUsername");
    const refLinkInput = document.getElementById("refLinkInput");
    const editNameInput = document.getElementById("editName");

    // Кнопки
    const showRefsBtn = document.getElementById("showRefsBtn");
    const checkSubBtn = document.getElementById("checkSubBtn");
    const topBtn = document.getElementById("topBtn");
    const myAchievementsBtn = document.getElementById("myAchievementsBtn");
    const copyRefBtn = document.getElementById("copyRefBtn");
    const shareRefBtn = document.getElementById("shareRefBtn");
    const saveProfileBtn = document.getElementById("saveProfileBtn");

    // Вспомогательные функции
    function sendToBot(type, extra = {}) {
        const payload = JSON.stringify({ type, ...extra });
        tg.sendData(payload);
        console.log("Sent:", payload);
    }

    // Обработчики
    showRefsBtn.onclick = () => sendToBot("get_refs");
    checkSubBtn.onclick = () => sendToBot("check_subscription_web");
    topBtn.onclick = () => sendToBot("get_top");
    myAchievementsBtn.onclick = () => sendToBot("get_achievements");
    saveProfileBtn.onclick = () => {
        const newName = editNameInput.value.trim();
        if (newName) sendToBot("update_name", { name: newName });
        else alert("Введите имя");
    };
    copyRefBtn.onclick = () => {
        refLinkInput.select();
        document.execCommand("copy");
        tg.showPopup({ title: "Готово", message: "Ссылка скопирована!", buttons: [{ type: "ok" }] });
    };
    shareRefBtn.onclick = () => {
        const link = refLinkInput.value;
        window.open(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Присоединяйся к QOWL World!`);
    };

    // Аватар и имя
    if (photoUrl) {
        userAvatar.src = photoUrl;
    } else {
        const canvas = document.createElement('canvas');
        canvas.width = 70; canvas.height = 70;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = "#d4af37";
        ctx.fillRect(0, 0, 70, 70);
        ctx.fillStyle = "#000";
        ctx.font = "bold 32px sans-serif";
        ctx.fillText((firstName[0] || "Q").toUpperCase(), 22, 48);
        userAvatar.src = canvas.toDataURL();
    }
    const fullName = lastName ? `${firstName} ${lastName}` : firstName;
    userFullName.innerHTML = `${fullName} ${isPremium ? '<span class="badge">⭐ PREMIUM</span>' : ''}`;
    userUsernameSpan.innerText = username ? `@${username}` : "";

    // Реферальная ссылка (бот @qowl_bot)
    const botUsername = "qowl_bot";
    const refLink = `https://t.me/${botUsername}?start=${userId}`;
    refLinkInput.value = refLink;

    // Время и погода
    function updateTime() {
        const now = new Date();
        document.getElementById("timeDisplay").innerHTML = `⏰ ${now.toLocaleTimeString()}`;
    }
    updateTime();
    setInterval(updateTime, 1000);

    async function fetchWeather() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const ipData = await res.json();
            const city = ipData.city || "Москва";
            const weatherRes = await fetch(`https://wttr.in/${city}?format=j1&lang=ru`);
            const weather = await weatherRes.json();
            const temp = weather.current_condition[0].temp_C;
            const desc = weather.current_condition[0].lang_ru[0].value;
            document.getElementById("weatherDisplay").innerHTML = `🌍 ${city} | 🌡️ ${temp}°C ${desc}`;
        } catch(e) {
            document.getElementById("weatherDisplay").innerHTML = "🌤️ Погода недоступна";
        }
    }
    fetchWeather();
    setInterval(fetchWeather, 600000);

    // Переключение вкладок
    const tabs = document.querySelectorAll(".tab");
    const contents = document.querySelectorAll(".tab-content");
    function switchTab(tabId) {
        contents.forEach(c => c.classList.remove("active"));
        document.getElementById(tabId).classList.add("active");
        tabs.forEach(t => t.classList.remove("active"));
        document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add("active");
    }
    tabs.forEach(tab => {
        tab.addEventListener("click", () => {
            const tabId = tab.getAttribute("data-tab");
            switchTab(tabId);
        });
    });

    // АВТОМАТИЧЕСКАЯ ПРОВЕРКА ПОДПИСКИ (при загрузке страницы)
    // Отправляем боту запрос "check_subscription_auto", бот проверит и выдаст достижение (без уведомления)
    sendToBot("check_subscription_auto");
</script>
</body>
</html>
