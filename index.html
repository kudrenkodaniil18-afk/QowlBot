<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QOWL World</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 16px;
            padding-bottom: 40px;
        }
        .card {
            background: #121212;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 16px;
        }
        .profile-header { display: flex; align-items: center; gap: 14px; }
        .avatar {
            width: 64px; height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #d4af37;
            background: #1a1a1a;
        }
        .profile-name {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .profile-username { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
        .badge { background: #d4af37; color: #000; border-radius: 30px; padding: 2px 10px; font-size: 0.65rem; margin-left: 8px; }
        button {
            background: linear-gradient(135deg, #d4af37, #b8942e);
            border: none;
            border-radius: 40px;
            padding: 10px 18px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #0a0a0a;
            cursor: pointer;
            margin: 4px;
            transition: 0.1s;
        }
        button:active { transform: scale(0.96); }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            white-space: nowrap;
        }
        .tab {
            background: #1a1a1a;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid #333;
            color: #ccc;
            flex-shrink: 0;
        }
        .tab.active {
            background: #d4af37;
            color: #0a0a0a;
            border-color: #d4af37;
        }
        .tab-content { display: none; animation: fade 0.2s; }
        .tab-content.active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 28px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 12px;
        }
        .info-row { display: flex; justify-content: space-between; margin-top: 14px; gap: 8px; flex-wrap: wrap; }
        .weather-time { background: #111; border-radius: 40px; padding: 6px 14px; font-size: 0.75rem; color: #d4af37; border: 1px solid #333; }
        footer { text-align: center; font-size: 0.65rem; margin-top: 20px; color: #555; }
    </style>
</head>
<body>

<div class="card">
    <div class="profile-header">
        <img class="avatar" id="userAvatar" src="" alt="avatar">
        <div>
            <div class="profile-name" id="userFullName">Загрузка...</div>
            <div class="profile-username" id="userUsername"></div>
        </div>
    </div>
    <div class="info-row">
        <div class="weather-time" id="timeDisplay">⏰ --:--:--</div>
        <div class="weather-time" id="weatherDisplay">🌤️ Загрузка...</div>
    </div>
</div>

<div class="tabs">
    <div class="tab active" data-tab="home">🏠 Главная</div>
    <div class="tab" data-tab="referrals">👥 Рефералы</div>
    <div class="tab" data-tab="achievements">🏆 Достижения</div>
    <div class="tab" data-tab="profile">✏️ Профиль</div>
    <div class="tab" data-tab="admin" id="adminTab" style="display:none">⚙️ Админ</div>
</div>

<div id="home" class="tab-content active">
    <div class="card">
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;">
            <button id="checkSubBtn">📌 Проверить подписку</button>
            <button id="topBtn">🏆 Топ рефералов</button>
        </div>
        <div style="margin-top: 18px; text-align: center;">
            <p>🔗 Реферальная ссылка:</p>
            <input type="text" id="refLinkInput" readonly style="text-align: center;">
            <div style="margin-top: 10px;">
                <button id="copyRefBtn">📋 Копировать</button>
                <button id="shareRefBtn">📤 Поделиться</button>
            </div>
        </div>
    </div>
</div>

<div id="referrals" class="tab-content">
    <div class="card">
        <button id="showRefsBtn" style="width:100%">👥 Показать рефералов</button>
    </div>
</div>

<div id="achievements" class="tab-content">
    <div class="card">
        <button id="showAchievementsBtn" style="width:100%">🏅 Показать достижения</button>
    </div>
</div>

<div id="profile" class="tab-content">
    <div class="card">
        <label>Имя (в боте):</label>
        <input type="text" id="editName" placeholder="Новое имя">
        <button id="saveProfileBtn">💾 Сохранить</button>
    </div>
</div>

<div id="admin" class="tab-content">
    <div class="card">
        <h3>📢 Рассылка</h3>
        <input type="text" id="bcHeader" placeholder="Заголовок">
        <textarea id="bcText" rows="3" placeholder="Текст" style="background:#111; color:#fff; border-radius:20px; padding:12px;"></textarea>
        <button id="startBroadcastBtn">▶ Запустить (текст)</button>
    </div>
    <div class="card">
        <h3>🔍 Поиск</h3>
        <input type="text" id="searchUserId" placeholder="ID или @username">
        <button id="searchUserBtn">Найти</button>
    </div>
    <div class="card">
        <h3>🚫 Бан / ✅ Разбан</h3>
        <input type="text" id="banUserId" placeholder="ID">
        <button id="banUserBtn" class="danger-btn">Забанить</button>
        <button id="unbanUserBtn" class="secondary-btn">Разбанить</button>
    </div>
    <div class="card">
        <h3>📊 Графики</h3>
        <button id="statsBtn">Показать</button>
    </div>
</div>

<footer>Данные обновляются через бота</footer>

<script>
    const tg = Telegram.WebApp;
    tg.ready();
    tg.expand();

    let user = tg.initDataUnsafe?.user || {};
    let userId = user.id;
    let firstName = user.first_name || "Гость";
    let username = user.username || "";
    let photoUrl = user.photo_url || "";
    let isPremium = user.is_premium || false;

    const ADMIN_IDS = [6411263772];
    const isAdmin = ADMIN_IDS.includes(userId);

    // DOM
    const userAvatar = document.getElementById("userAvatar");
    const userFullName = document.getElementById("userFullName");
    const userUsernameSpan = document.getElementById("userUsername");
    const refLinkInput = document.getElementById("refLinkInput");
    const editNameInput = document.getElementById("editName");

    function sendToBot(type, extra = {}) {
        tg.sendData(JSON.stringify({ type, ...extra }));
    }

    // Кнопки
    document.getElementById("showRefsBtn").onclick = () => sendToBot("get_refs");
    document.getElementById("showAchievementsBtn").onclick = () => sendToBot("get_achievements");
    document.getElementById("checkSubBtn").onclick = () => sendToBot("check_subscription");
    document.getElementById("topBtn").onclick = () => sendToBot("get_top");
    document.getElementById("saveProfileBtn").onclick = () => {
        let newName = editNameInput.value.trim();
        if (newName) sendToBot("update_name", { name: newName });
        else alert("Введите имя");
    };
    document.getElementById("copyRefBtn").onclick = () => {
        refLinkInput.select();
        document.execCommand("copy");
        alert("Ссылка скопирована!");
    };
    document.getElementById("shareRefBtn").onclick = () => {
        window.open(`https://t.me/share/url?url=${encodeURIComponent(refLinkInput.value)}&text=Присоединяйся к QOWL!`);
    };

    if (isAdmin) {
        document.getElementById("adminTab").style.display = "flex";
        document.getElementById("startBroadcastBtn").onclick = () => {
            let header = document.getElementById("bcHeader").value;
            let text = document.getElementById("bcText").value;
            if (header && text) sendToBot("start_broadcast", { header, text });
            else alert("Заполните заголовок и текст");
        };
        document.getElementById("searchUserBtn").onclick = () => {
            let q = document.getElementById("searchUserId").value.trim();
            if (q) sendToBot("search_user", { query: q });
            else alert("Введите ID или @username");
        };
        document.getElementById("banUserBtn").onclick = () => {
            let uid = document.getElementById("banUserId").value.trim();
            if (uid && /^\d+$/.test(uid)) sendToBot("ban_user", { user_id: parseInt(uid) });
            else alert("Введите ID");
        };
        document.getElementById("unbanUserBtn").onclick = () => {
            let uid = document.getElementById("banUserId").value.trim();
            if (uid && /^\d+$/.test(uid)) sendToBot("unban_user", { user_id: parseInt(uid) });
            else alert("Введите ID");
        };
        document.getElementById("statsBtn").onclick = () => sendToBot("get_stats");
    }

    // Аватар и имя
    if (photoUrl) userAvatar.src = photoUrl;
    else {
        const canvas = document.createElement('canvas');
        canvas.width = 64; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = "#d4af37";
        ctx.fillRect(0, 0, 64, 64);
        ctx.fillStyle = "#000";
        ctx.font = "bold 28px sans-serif";
        ctx.fillText((firstName[0] || "Q").toUpperCase(), 20, 44);
        userAvatar.src = canvas.toDataURL();
    }
    userFullName.innerHTML = `${firstName} ${isPremium ? '<span class="badge">⭐ PREMIUM</span>' : ''}`;
    userUsernameSpan.innerText = username ? `@${username}` : "";
    const botUsername = "qowl_bot";
    refLinkInput.value = `https://t.me/${botUsername}?start=${userId}`;

    // Время и погода
    function updateTime() {
        document.getElementById("timeDisplay").innerHTML = `⏰ ${new Date().toLocaleTimeString()}`;
    }
    updateTime();
    setInterval(updateTime, 1000);
    async function fetchWeather() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const ipData = await res.json();
            const city = ipData.city || "Москва";
            const weatherRes = await fetch(`https://wttr.in/${city}?format=j1&lang=ru`);
            const weather = await weatherRes.json();
            const temp = weather.current_condition[0].temp_C;
            const desc = weather.current_condition[0].lang_ru[0].value;
            document.getElementById("weatherDisplay").innerHTML = `🌍 ${city} | 🌡️ ${temp}°C ${desc}`;
        } catch(e) {
            document.getElementById("weatherDisplay").innerHTML = "🌤️ Погода недоступна";
        }
    }
    fetchWeather();
    setInterval(fetchWeather, 600000);

    // Вкладки
    const tabs = document.querySelectorAll(".tab");
    const contents = document.querySelectorAll(".tab-content");
    function switchTab(tabId) {
        contents.forEach(c => c.classList.remove("active"));
        document.getElementById(tabId).classList.add("active");
        tabs.forEach(t => t.classList.remove("active"));
        document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add("active");
    }
    tabs.forEach(tab => {
        if (tab.style.display !== "none") {
            tab.addEventListener("click", () => switchTab(tab.getAttribute("data-tab")));
        }
    });
</script>
</body>
</html>
