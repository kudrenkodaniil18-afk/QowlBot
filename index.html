<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Проверка подписки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        button { background: #2c7be5; color: white; border: none; border-radius: 12px; padding: 14px 24px; font-size: 1.2rem; width: 100%; margin: 20px 0; cursor: pointer; }
        .debug { background: #f0f0f0; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 0.8rem; text-align: left; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
<h1>📢 Проверка подписки</h1>
<button id="checkBtn">🔍 Проверить подписку</button>
<div class="debug" id="debug"></div>

<script>
    const debugDiv = document.getElementById('debug');
    function log(msg) {
        debugDiv.innerHTML += new Date().toLocaleTimeString() + ' ' + msg + '\n';
        debugDiv.scrollTop = debugDiv.scrollHeight;
        console.log(msg);
    }
    if (window.Telegram && Telegram.WebApp) {
        const tg = Telegram.WebApp;
        tg.expand();
        tg.ready();
        log('✅ WebApp готов');
        const user = tg.initDataUnsafe?.user;
        log(`User ID: ${user?.id || 'неизвестно'}`);

        document.getElementById('checkBtn').onclick = () => {
            log('🔘 Нажата кнопка');
            const payload = JSON.stringify({ type: "check_subscription" });
            log(`📤 Отправка: ${payload}`);
            tg.sendData(payload);
            log('📨 Данные отправлены');
            tg.showPopup({ title: "Отправлено", message: "Бот ответит в чат", buttons: [{type: "ok"}] });
        };
    } else {
        log('❌ Ошибка: не удалось инициализировать Telegram WebApp. Откройте страницу через бота.');
    }
</script>
</body>
</html>
