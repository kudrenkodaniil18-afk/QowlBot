<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Проверка подписки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        button {
            background: var(--tg-theme-button-color, #2c7be5);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            padding: 14px 24px;
            font-size: 1.2rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 20px;
        }
        button:active {
            opacity: 0.7;
        }
        .info {
            margin-top: 30px;
            padding: 16px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 16px;
            font-size: 0.9rem;
        }
        .status {
            font-weight: bold;
            margin-top: 10px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .subscribed {
            color: #00c853;
        }
        .not-subscribed {
            color: #d32f2f;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📢 Проверка подписки</h1>
    <p>Нажмите кнопку, чтобы бот проверил вашу подписку на канал</p>
    <button id="checkBtn">🔍 Проверить подписку</button>
    <div class="info">
        ℹ️ Результат придёт в чат с ботом.
        <div class="status" id="statusMsg"></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // разворачиваем на весь экран
    tg.ready();

    const checkBtn = document.getElementById('checkBtn');
    const statusDiv = document.getElementById('statusMsg');

    checkBtn.addEventListener('click', () => {
        // Отправляем команду в бот
        tg.sendData(JSON.stringify({ type: "check_subscription" }));
        statusDiv.innerHTML = "⏳ Запрос отправлен... Ждите ответ в чате.";
        statusDiv.style.color = "var(--tg-theme-hint-color, #888)";
        // Можно также показать всплывающее уведомление
        tg.showPopup({
            title: "Отправлено",
            message: "Бот проверит подписку и ответит в этом чате.",
            buttons: [{type: "ok"}]
        });
    });

    // Необязательно: можно показать приветствие
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        const user = tg.initDataUnsafe.user;
        console.log(`Пользователь: ${user.first_name} (${user.id})`);
    }
</script>
</body>
</html>
